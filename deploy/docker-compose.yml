name: competeiq

# Build the UI image and run it locally with persistent Chroma storage.
#
# Usage:
#   cd <repo root>
#   docker compose -f deploy/docker-compose.yml up --build
#
# Then open: http://localhost:7860
#
# Secrets are read from the project-root .env file (NOT baked into the image).

services:
  ui:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.ui
    image: competeiq-ui:latest
    container_name: competeiq-ui
    env_file:
      - ../.env
    environment:
      COMPETEIQ_CHROMA_MODE: persistent
      COMPETEIQ_CHROMA_PATH: /data/.chroma
      GRADIO_SERVER_NAME: "0.0.0.0"
      GRADIO_SERVER_PORT: "7860"
    ports:
      - "7860:7860"
    volumes:
      - chroma-data:/data
      - ../datasets:/app/datasets:ro
    restart: unless-stopped
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://127.0.0.1:7860/').status==200 else 1)"
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cli:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: competeiq:latest
    container_name: competeiq-cli
    profiles: ["cli"]   # only starts when explicitly requested: docker compose --profile cli run cli ...
    env_file:
      - ../.env
    environment:
      COMPETEIQ_CHROMA_MODE: persistent
      COMPETEIQ_CHROMA_PATH: /data/.chroma
    volumes:
      - chroma-data:/data
      - ../datasets:/app/datasets:ro

volumes:
  chroma-data:
    name: competeiq-chroma
