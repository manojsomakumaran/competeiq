name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHONDONTWRITEBYTECODE: "1"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  # Dummy credentials so pydantic-settings BaseSettings validates; tests mock all live calls.
  OPENAI_API_KEY: "ci-dummy-openai"
  LANGFUSE_SECRET_KEY: "ci-dummy-lf-secret"
  LANGFUSE_PUBLIC_KEY: "ci-dummy-lf-public"
  LANGFUSE_HOST: "https://ci.invalid"
  COMPETEIQ_CHROMA_MODE: "memory"

jobs:
  lint:
    name: Lint (ruff + mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install lint toolchain
        run: |
          python -m pip install --upgrade pip
          pip install ruff==0.6.9 mypy==1.11.2
      - name: ruff check
        run: ruff check src tests
      - name: ruff format check
        run: ruff format --check src tests
      - name: mypy
        run: mypy src/competeiq
        continue-on-error: true

  unit-tests:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install runtime + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements/base.txt -r requirements/test.txt
      - name: Collect tests (install-free sanity check)
        run: pytest --collect-only -q
      - name: Run unit tests
        # integration_ui is LOCAL ONLY and explicitly skipped in CI.
        run: pytest -m "unit and not integration_ui" --maxfail=5 --durations=10

  build-wheel:
    name: Build sdist + wheel
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install build
        run: python -m pip install --upgrade pip build
      - name: Build distribution
        run: python -m build
      - name: Upload artefacts
        uses: actions/upload-artifact@v4
        with:
          name: competeiq-dist
          path: dist/*
          retention-days: 14
