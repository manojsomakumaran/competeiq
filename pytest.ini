[pytest]
minversion = 8.0
pythonpath = src
testpaths = tests
addopts = -ra --strict-markers --tb=short
markers =
    unit: pure unit tests, fully mocked, no network
    integration_api: integration tests against live OpenAI/Langfuse/ChromaDB
    integration_ui: Gradio UI end-to-end tests (local only, not in CI)
    slow: long-running tests (skipped by default in CI fast path)
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
